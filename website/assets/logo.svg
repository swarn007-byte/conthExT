<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a85f4" />
      <stop offset="50%" stop-color="#6f6bd9" />
      <stop offset="100%" stop-color="#4944b2" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- conthExT curved lens representation -->
  <path d="M 25 35 C 45 20, 55 20, 75 35 C 75 55, 75 65, 75 65 C 55 50, 45 50, 25 65 Z" fill="url(#logoGrad)" filter="url(#logoGlow)" />
  <!-- Structured memory dots (nodes) underneath -->
  <circle cx="28" cy="72" r="5" fill="#fafafa" opacity="0.9" />
  <circle cx="50" cy="78" r="6" fill="#8a85f4" />
  <circle cx="72" cy="72" r="5" fill="#fafafa" opacity="0.9" />
  <line x1="28" y1="72" x2="50" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <line x1="72" y1="72" x2="50" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
</svg>
